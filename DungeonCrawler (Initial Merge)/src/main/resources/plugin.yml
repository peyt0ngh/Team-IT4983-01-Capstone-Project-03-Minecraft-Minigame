name: DungeonCrawler
version: 1.0.0
main: com.ryan.dungeoncrawler.DungeonCrawlerPlugin
api-version: 1.20
description: Dungeon Crawler minigame with stage progression, scoring, loot, and themed dungeons.
author: Ryan

commands:

  mgstart:
    description: Start a dungeon crawler session.
    usage: /mgstart <singleplayer|multiplayer>
    aliases: [startgame]
    permission: dungeoncrawler.admin

  mgstop:
    description: Stop the active dungeon session.
    usage: /mgstop
    aliases: [stopgame]
    permission: dungeoncrawler.admin

  mgscore:
    description: View live scores.
    usage: /mgscore
    aliases: [score, scores]

  mgstageclear:
    description: Force advance to the next stage.
    usage: /mgstageclear <seconds>
    aliases: [stageclear]
    permission: dungeoncrawler.admin

  mgaddtreasure:
    description: Give treasure to a player.
    usage: /mgaddtreasure <player> <rarity>
    aliases: [addtreasure]
    permission: dungeoncrawler.admin

  mgdebug:
    description: View dungeon debug information.
    usage: /mgdebug
    permission: dungeoncrawler.admin

permissions:

  dungeoncrawler.admin:
    description: Admin control of the dungeon system.
    default: op

  dungeoncrawler.play:
    description: Participate in dungeon runs.
    default: true
