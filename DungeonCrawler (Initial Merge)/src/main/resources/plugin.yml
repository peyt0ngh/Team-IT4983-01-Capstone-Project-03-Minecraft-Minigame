name: DungeonCrawler
version: 1.0.0
main: com.ryan.dungeoncrawler.DungeonCrawlerPlugin
api-version: 1.20
description: Dungeon Crawler — unified timer, difficulty scaling, scoring, and treasures.
author: Ryan

commands:
  mgstart:
    description: Start a dungeon crawler session (initialises timer + scoring).
    usage: /mgstart <singleplayer|multiplayer>
    aliases: [startgame]
    permission: dungeoncrawler.admin

  mgstop:
    description: Stop the current session, cancel the timer, and display final scores.
    usage: /mgstop
    aliases: [stopgame]
    permission: dungeoncrawler.admin

  mgscore:
    description: View the current live scoreboard.
    usage: /mgscore
    aliases: [score, scores]

  mgstageclear:
    description: >
      Manually complete the current level and bank the specified seconds as a
      time bonus. Also advances the difficulty and spawns the next wave.
    usage: /mgstageclear <seconds>
    aliases: [stageclear]
    permission: dungeoncrawler.admin

  mgaddtreasure:
    description: Give a treasure item of a specified rarity directly to a player.
    usage: /mgaddtreasure <player> <common|uncommon|rare|superrare>
    aliases: [addtreasure]
    permission: dungeoncrawler.admin

permissions:
  dungeoncrawler.admin:
    description: Access to game management commands (start, stop, stageclear, addtreasure).
    default: op
  dungeoncrawler.play:
    description: Allows participation in a scored dungeon run.
    default: true
