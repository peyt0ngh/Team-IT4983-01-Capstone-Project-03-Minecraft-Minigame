name: MinigameScorer
version: 1.0.0
main: com.minigame.scorer.MinigameScorerPlugin
api-version: 1.20
description: Scoring system for minigames — kills, treasures, time bonuses, and deaths.
author: YourName

commands:
  mgscore:
    description: View the current scoreboard.
    usage: /mgscore
    aliases: [score, scores]

  mgstart:
    description: Start a minigame session.
    usage: /mgstart <singleplayer|multiplayer>
    aliases: [startgame]
    permission: minigamescorer.admin

  mgstop:
    description: Stop the current minigame session and display final scores.
    usage: /mgstop
    aliases: [stopgame]
    permission: minigamescorer.admin

  mgstageclear:
    description: Record remaining seconds for the current stage and advance to the next.
    usage: /mgstageclear <seconds>
    aliases: [stageclear]
    permission: minigamescorer.admin

  mgaddtreasure:
    description: Give a treasure item of a specified rarity to a player.
    usage: /mgaddtreasure <player> <common|uncommon|rare|superrare>
    aliases: [addtreasure]
    permission: minigamescorer.admin

permissions:
  minigamescorer.admin:
    description: Access to game management commands.
    default: op
  minigamescorer.play:
    description: Allows participation in a scored minigame.
    default: true
